<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitLane — Job Card System</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #181c26;
    --card:      #1f2433;
    --border:    #2a3044;
    --accent:    #f97316;
    --accent2:   #3b82f6;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #eab308;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --font-head: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-accent {
    background: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: #ea6c0a; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* ── BOARD AREA ── */
  .board-wrapper {
    padding: 28px 24px;
    overflow-x: auto;
    min-height: calc(100vh - 56px);
  }

  .board {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    min-width: max-content;
  }

  /* ── COLUMNS ── */
  .column {
    width: 300px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 110px);
  }

  .col-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .col-title {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .col-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-count {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    padding: 2px 8px;
    border-radius: 99px;
  }

  .col-cards {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .col-cards::-webkit-scrollbar { width: 4px; }
  .col-cards::-webkit-scrollbar-track { background: transparent; }
  .col-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .col-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .add-card-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .add-card-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(249,115,22,0.05);
  }

  /* ── JOB CARDS ── */
  .job-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .job-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .job-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .job-card.dragging {
    opacity: 0.4;
    transform: rotate(1.5deg) scale(0.97);
  }

  .drag-over {
    border-color: var(--accent) !important;
    background: rgba(249,115,22,0.05) !important;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .rego-badge {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    line-height: 1.3;
  }

  .card-menu-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    border-radius: 3px;
    transition: color 0.1s;
  }
  .card-menu-btn:hover { color: var(--text); }

  .vehicle-info {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .card-customer {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .parts-list {
    margin-bottom: 8px;
  }

  .part-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
    border: 1px solid rgba(59,130,246,0.25);
    padding: 2px 7px;
    border-radius: 3px;
    margin: 2px 2px 2px 0;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .card-date {
    font-size: 11px;
    color: var(--muted);
  }

  .priority-badge {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.18s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.1s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, select, textarea {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 12px;
    transition: border-color 0.15s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  input::placeholder, textarea::placeholder {
    color: var(--muted);
  }

  select option { background: var(--card); }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .rego-input-wrap {
    position: relative;
  }

  .rego-input-wrap input {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding-right: 100px;
  }

  .lookup-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: background 0.15s;
    text-transform: uppercase;
  }
  .lookup-btn:hover { background: #ea6c0a; }

  .vehicle-result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }
  .vehicle-result.visible { display: block; }
  .vehicle-result strong { color: var(--text); }

  .parts-input-wrap {
    display: flex;
    gap: 8px;
  }
  .parts-input-wrap input { flex: 1; }
  .add-part-btn {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 14px;
    border-radius: 5px;
    border: none;
    background: var(--accent2);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .add-part-btn:hover { background: #2563eb; }

  .parts-tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 32px;
    padding: 6px 0;
  }

  .part-tag-removable {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
    border: 1px solid rgba(59,130,246,0.3);
    padding: 3px 8px;
    border-radius: 3px;
  }

  .remove-part {
    background: none;
    border: none;
    color: #93c5fd;
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    line-height: 1;
    opacity: 0.6;
  }
  .remove-part:hover { opacity: 1; }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ── PRIORITY COLOURS ── */
  .pri-urgent  { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .pri-high    { background: rgba(249,115,22,0.15); color: #fdba74; border: 1px solid rgba(249,115,22,0.3); }
  .pri-normal  { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
  .pri-low     { background: rgba(100,116,139,0.15);color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

  .dot-urgent  { background: #ef4444; }
  .dot-waiting { background: #eab308; }
  .dot-progress{ background: #3b82f6; }
  .dot-done    { background: #22c55e; }

  /* ── CARD LEFT STRIPE ── */
  .stripe-urgent   { border-left: 3px solid #ef4444 !important; }
  .stripe-high     { border-left: 3px solid #f97316 !important; }
  .stripe-normal   { border-left: 3px solid #22c55e !important; }
  .stripe-low      { border-left: 3px solid #64748b !important; }

  /* ── EMPTY STATE ── */
  .empty-col {
    text-align: center;
    padding: 30px 10px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 12px 20px;
    border-radius: 6px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* scrollbar board */
  .board-wrapper::-webkit-scrollbar { height: 6px; }
  .board-wrapper::-webkit-scrollbar-track { background: transparent; }
  .board-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">PIT<span>LANE</span></div>
  <div class="header-right">
    <span style="font-size:13px;color:var(--muted);font-weight:500;">NZ Automotive Job Cards</span>
    <button class="btn btn-accent" onclick="openModal()">+ New Job</button>
  </div>
</header>

<!-- BOARD -->
<div class="board-wrapper">
  <div class="board" id="board">

    <!-- COLUMN: WAITING ON PARTS -->
    <div class="column" id="col-waiting" ondragover="onDragOver(event)" ondrop="onDrop(event,'waiting')">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-waiting"></span>Waiting on Parts</div>
        <span class="col-count" id="count-waiting">0</span>
      </div>
      <div class="col-cards" id="cards-waiting"></div>
      <div class="col-footer">
        <button class="add-card-btn" onclick="openModal('waiting')">＋ Add Job Card</button>
      </div>
    </div>

    <!-- COLUMN: IN PROGRESS -->
    <div class="column" id="col-progress" ondragover="onDragOver(event)" ondrop="onDrop(event,'progress')">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-progress"></span>In Progress</div>
        <span class="col-count" id="count-progress">0</span>
      </div>
      <div class="col-cards" id="cards-progress"></div>
      <div class="col-footer">
        <button class="add-card-btn" onclick="openModal('progress')">＋ Add Job Card</button>
      </div>
    </div>

    <!-- COLUMN: AWAITING APPROVAL -->
    <div class="column" id="col-approval" ondragover="onDragOver(event)" ondrop="onDrop(event,'approval')">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-urgent"></span>Awaiting Approval</div>
        <span class="col-count" id="count-approval">0</span>
      </div>
      <div class="col-cards" id="cards-approval"></div>
      <div class="col-footer">
        <button class="add-card-btn" onclick="openModal('approval')">＋ Add Job Card</button>
      </div>
    </div>

    <!-- COLUMN: COMPLETE -->
    <div class="column" id="col-done" ondragover="onDragOver(event)" ondrop="onDrop(event,'done')">
      <div class="col-header">
        <div class="col-title"><span class="col-dot dot-done"></span>Complete</div>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="col-cards" id="cards-done"></div>
      <div class="col-footer">
        <button class="add-card-btn" onclick="openModal('done')">＋ Add Job Card</button>
      </div>
    </div>

  </div>
</div>

<!-- NEW JOB MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Job Card</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- REGO -->
      <div class="form-group">
        <label>NZ Plate / Rego</label>
        <div class="rego-input-wrap">
          <input type="text" id="inp-rego" placeholder="ABC123" maxlength="8" oninput="this.value=this.value.toUpperCase()">
          <button class="lookup-btn" onclick="lookupVehicle()">Lookup</button>
        </div>
        <div class="vehicle-result" id="vehicleResult"></div>
      </div>

      <!-- CUSTOMER + PHONE -->
      <div class="form-row">
        <div class="form-group">
          <label>Customer Name</label>
          <input type="text" id="inp-customer" placeholder="e.g. James Holden">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="inp-phone" placeholder="021 000 0000">
        </div>
      </div>

      <!-- VEHICLE (auto-filled or manual) -->
      <div class="form-row">
        <div class="form-group">
          <label>Make / Model</label>
          <input type="text" id="inp-vehicle" placeholder="e.g. Toyota Hilux">
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="text" id="inp-year" placeholder="e.g. 2019">
        </div>
      </div>

      <!-- PARTS REQUESTED -->
      <div class="form-group">
        <label>Parts Requested</label>
        <div class="parts-input-wrap">
          <input type="text" id="inp-part" placeholder="e.g. Front brake pads" onkeydown="if(event.key==='Enter')addPart()">
          <button class="add-part-btn" onclick="addPart()">+ Add</button>
        </div>
        <div class="parts-tags-container" id="partsTags">
          <span style="font-size:12px;color:var(--muted);align-self:center;">No parts added yet</span>
        </div>
      </div>

      <!-- NOTES -->
      <div class="form-group">
        <label>Job Notes</label>
        <textarea id="inp-notes" placeholder="Additional notes, faults, customer requests..."></textarea>
      </div>

      <!-- PRIORITY + COLUMN -->
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="inp-priority">
            <option value="normal">Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Column</label>
          <select id="inp-column">
            <option value="waiting">Waiting on Parts</option>
            <option value="progress">In Progress</option>
            <option value="approval">Awaiting Approval</option>
            <option value="done">Complete</option>
          </select>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveCard()">Create Job Card</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let jobs = JSON.parse(localStorage.getItem('pitlane_jobs') || '[]');
  let parts = [];
  let dragId = null;

  // ── DEMO DATA (first load) ──
  if (jobs.length === 0) {
    jobs = [
      { id: uid(), rego: 'GHT421', customer: 'Mike Tane', phone: '021 555 1234', vehicle: 'Toyota Hilux', year: '2018', parts: ['Front brake pads', 'Brake fluid'], notes: 'Customer says squealing on left front.', priority: 'urgent', column: 'progress', date: today() },
      { id: uid(), rego: 'RXZ992', customer: 'Sarah Collins', phone: '027 444 8800', vehicle: 'Subaru Forester', year: '2016', parts: ['Oil filter', 'Engine oil 5W-30', 'Air filter'], notes: '100,000km service due.', priority: 'normal', column: 'waiting', date: today() },
      { id: uid(), rego: 'KBB777', customer: 'Dave Ngata', phone: '021 321 9900', vehicle: 'Mazda Atenza', year: '2020', parts: ['Cabin air filter'], notes: 'A/C smells musty.', priority: 'low', column: 'approval', date: today() },
      { id: uid(), rego: 'FLX203', customer: 'Priya Sharma', phone: '022 111 4455', vehicle: 'Honda CR-V', year: '2017', parts: ['CV axle shaft', 'Wheel bearing'], notes: 'Clicking noise on hard left turn.', priority: 'high', column: 'progress', date: today() },
    ];
    save();
  }

  // ── HELPERS ──
  function uid() { return '_' + Math.random().toString(36).slice(2, 9); }
  function today() { return new Date().toLocaleDateString('en-NZ', { day:'numeric', month:'short', year:'numeric' }); }
  function save() { localStorage.setItem('pitlane_jobs', JSON.stringify(jobs)); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── RENDER ──
  function render() {
    const cols = ['waiting','progress','approval','done'];
    cols.forEach(col => {
      const container = document.getElementById('cards-' + col);
      const colJobs = jobs.filter(j => j.column === col);
      document.getElementById('count-' + col).textContent = colJobs.length;

      if (colJobs.length === 0) {
        container.innerHTML = '<div class="empty-col">No jobs here yet</div>';
        return;
      }

      container.innerHTML = colJobs.map(j => `
        <div class="job-card stripe-${j.priority}" draggable="true"
             ondragstart="onDragStart(event,'${j.id}')"
             ondragend="onDragEnd(event)"
             id="jcard-${j.id}">
          <div class="card-top">
            <div class="rego-badge">${j.rego}</div>
            <button class="card-menu-btn" onclick="deleteCard('${j.id}')">🗑</button>
          </div>
          <div class="vehicle-info">${j.vehicle} ${j.year}</div>
          <div class="card-customer">👤 ${j.customer} · ${j.phone}</div>
          <div class="parts-list">
            ${j.parts.map(p => `<span class="part-tag">${p}</span>`).join('')}
          </div>
          ${j.notes ? `<div style="font-size:12px;color:var(--muted);margin-bottom:4px;line-height:1.4;">${j.notes}</div>` : ''}
          <div class="card-footer">
            <span class="card-date">📅 ${j.date}</span>
            <span class="priority-badge pri-${j.priority}">${j.priority}</span>
          </div>
        </div>
      `).join('');
    });
  }

  // ── MODAL ──
  let defaultCol = 'waiting';

  function openModal(col) {
    defaultCol = col || 'waiting';
    document.getElementById('inp-column').value = defaultCol;
    document.getElementById('modalOverlay').classList.add('open');
    parts = [];
    renderPartsTags();
    // Clear fields
    ['rego','customer','phone','vehicle','year','notes'].forEach(id => document.getElementById('inp-'+id).value = '');
    document.getElementById('vehicleResult').classList.remove('visible');
    document.getElementById('inp-priority').value = 'normal';
    setTimeout(() => document.getElementById('inp-rego').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target.id === 'modalOverlay') closeModal();
  }

  // ── FAKE REGO LOOKUP (placeholder until real API) ──
  const fakeDB = {
    'ABC123': { vehicle: 'Toyota Corolla', year: '2015', vin: 'JT2AE09W3F0123456' },
    'XYZ789': { vehicle: 'Subaru Impreza', year: '2018', vin: 'JF1GH7F68JH012345' },
    'GHT421': { vehicle: 'Toyota Hilux', year: '2018', vin: 'MR0FR22G500123456' },
  };

  function lookupVehicle() {
    const rego = document.getElementById('inp-rego').value.trim().toUpperCase();
    const result = document.getElementById('vehicleResult');
    if (!rego) { alert('Enter a rego plate first.'); return; }

    // Simulate API call
    result.innerHTML = '⏳ Looking up vehicle...';
    result.classList.add('visible');

    setTimeout(() => {
      const found = fakeDB[rego];
      if (found) {
        result.innerHTML = `✅ <strong>${found.vehicle} ${found.year}</strong> &nbsp;·&nbsp; VIN: <strong>${found.vin}</strong>`;
        document.getElementById('inp-vehicle').value = found.vehicle;
        document.getElementById('inp-year').value = found.year;
      } else {
        result.innerHTML = `⚠️ No match found for <strong>${rego}</strong> — enter vehicle details manually. <em>(Live CARJAM lookup coming soon)</em>`;
      }
    }, 800);
  }

  // ── PARTS ──
  function addPart() {
    const inp = document.getElementById('inp-part');
    const val = inp.value.trim();
    if (!val) return;
    parts.push(val);
    inp.value = '';
    renderPartsTags();
    inp.focus();
  }

  function removePart(i) {
    parts.splice(i, 1);
    renderPartsTags();
  }

  function renderPartsTags() {
    const c = document.getElementById('partsTags');
    if (parts.length === 0) {
      c.innerHTML = '<span style="font-size:12px;color:var(--muted);align-self:center;">No parts added yet</span>';
      return;
    }
    c.innerHTML = parts.map((p, i) => `
      <span class="part-tag-removable">
        ${p}
        <button class="remove-part" onclick="removePart(${i})">×</button>
      </span>
    `).join('');
  }

  // ── SAVE ──
  function saveCard() {
    const rego = document.getElementById('inp-rego').value.trim().toUpperCase();
    const customer = document.getElementById('inp-customer').value.trim();
    if (!rego) { alert('Rego / plate is required.'); return; }
    if (!customer) { alert('Customer name is required.'); return; }

    jobs.push({
      id: uid(),
      rego,
      customer,
      phone: document.getElementById('inp-phone').value.trim() || '—',
      vehicle: document.getElementById('inp-vehicle').value.trim() || 'Unknown',
      year: document.getElementById('inp-year').value.trim() || '—',
      parts: [...parts],
      notes: document.getElementById('inp-notes').value.trim(),
      priority: document.getElementById('inp-priority').value,
      column: document.getElementById('inp-column').value,
      date: today(),
    });
    save();
    render();
    closeModal();
    showToast('✔ Job card created!');
  }

  // ── DELETE ──
  function deleteCard(id) {
    if (!confirm('Delete this job card?')) return;
    jobs = jobs.filter(j => j.id !== id);
    save();
    render();
    showToast('Job card removed.');
  }

  // ── DRAG & DROP ──
  function onDragStart(e, id) {
    dragId = id;
    setTimeout(() => document.getElementById('jcard-'+id)?.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd(e) {
    document.querySelectorAll('.job-card').forEach(c => c.classList.remove('dragging'));
  }

  function onDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
    e.dataTransfer.dropEffect = 'move';
  }

  function onDrop(e, col) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    if (!dragId) return;
    const job = jobs.find(j => j.id === dragId);
    if (job && job.column !== col) {
      job.column = col;
      save();
      render();
      showToast('Card moved ✔');
    }
    dragId = null;
  }

  // Remove drag-over highlight when leaving column
  document.addEventListener('dragleave', e => {
    if (e.target.classList?.contains('column')) {
      e.target.classList.remove('drag-over');
    }
  });

  // ── INIT ──
  render();
</script>
</body>
</html>
